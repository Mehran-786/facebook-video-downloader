<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Downloader</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="content">

    <div class="fb-icon">
        <i class="fab fa-facebook-f"></i>
    </div>

    <h1>Facebook Video Downloader</h1>

    <p class="tagline">
    Download high-quality videos from Facebook easily
    </p>

    <div class="platform-buttons">
        <div class="platform-btn threads">
            <i class="fa-brands fa-threads"></i>
        </div>
        <div class="platform-btn instagram">
            <i class="fab fa-instagram"></i>
        </div>
        <div class="platform-btn youtube">
            <i class="fab fa-youtube"></i>
        </div>
    </div>

    <div class="input-group">
        <input type="text" class="url-input" id="videoUrl" placeholder="Paste Facebook video link here...">
        <button class="download-btn" id="downloadBtn">Download</button>
    </div>

    <div class="features-container">
        <div class="feature-box">
            <i class="fas fa-bolt"></i>
            <h3>Fast Download</h3>
            <p>Grab Facebook videos in seconds with optimized servers</p>
        </div>
        
        <div class="feature-box">
            <i class="fas fa-shield-alt"></i>
            <h3>Safe & Secure</h3>
            <p>No login, no tracking — your privacy matters</p>
        </div>
        
        <div class="feature-box">
            <i class="fas fa-star"></i>
            <h3>HD Quality</h3>
            <p>Preserve original quality up to 1080p / 4K</p>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
